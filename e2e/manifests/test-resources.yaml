# test fixtures for e2e tests
---
# Gateway in test namespace for form selects and targetRef
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: test-gateway
  namespace: kuadrant-test
spec:
  gatewayClassName: istio
  listeners:
  - name: http
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: Same
---
# HTTPRoute for targetRef in auth/ratelimit forms
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: test-route
  namespace: kuadrant-test
spec:
  parentRefs:
  - name: test-gateway
    namespace: kuadrant-test
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: test-service
      port: 8080
---
# ClusterIssuer for TLS policy form
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: test-selfsigned
spec:
  selfSigned: {}
---
# AuthPolicy fixture for RBAC kebab tests
apiVersion: kuadrant.io/v1
kind: AuthPolicy
metadata:
  name: test-auth-policy
  namespace: kuadrant-test
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: test-route
  rules:
    authentication:
      "anon":
        anonymous: {}
